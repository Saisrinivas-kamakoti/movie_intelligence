services:
  - type: web
    name: cine-signal-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: cinesignal
      - key: CORS_ORIGINS
        sync: false
      - key: TMDB_API_KEY
        sync: false

  - type: static
    name: cine-signal-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false

